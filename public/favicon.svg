<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Green background -->
  <rect width="32" height="32" rx="5" fill="#2c5f2e"/>

  <!-- Left person -->
  <circle cx="9" cy="9" r="2.5" fill="#ffffff" opacity="0.8"/>
  <path d="M5.5 15.5 Q5.5 12.5 9 12.5 Q12.5 12.5 12.5 15.5 Z" fill="#ffffff" opacity="0.8"/>

  <!-- Centre person (front / most prominent) -->
  <circle cx="16" cy="8" r="3" fill="#ffffff"/>
  <path d="M12 15.5 Q12 12 16 12 Q20 12 20 15.5 Z" fill="#ffffff"/>

  <!-- Right person -->
  <circle cx="23" cy="9" r="2.5" fill="#ffffff" opacity="0.8"/>
  <path d="M19.5 15.5 Q19.5 12.5 23 12.5 Q26.5 12.5 26.5 15.5 Z" fill="#ffffff" opacity="0.8"/>

  <!-- Open book -->
  <!-- Spine -->
  <rect x="15" y="18" width="2" height="12" rx="1" fill="#1d4020"/>
  <!-- Left page -->
  <path d="M15 19 Q10 19 5 21 L5 30 Q10 28 15 28 Z" fill="#e8f4e8"/>
  <!-- Right page -->
  <path d="M17 19 Q22 19 27 21 L27 30 Q22 28 17 28 Z" fill="#ffffff"/>
  <!-- Left page lines -->
  <line x1="6.5" y1="23"   x2="13.5" y2="22.2" stroke="#2c5f2e" stroke-width="0.7" opacity="0.35"/>
  <line x1="6.5" y1="25.5" x2="13.5" y2="24.7" stroke="#2c5f2e" stroke-width="0.7" opacity="0.35"/>
  <!-- Right page lines -->
  <line x1="18.5" y1="22.2" x2="25.5" y2="23"   stroke="#2c5f2e" stroke-width="0.7" opacity="0.35"/>
  <line x1="18.5" y1="24.7" x2="25.5" y2="25.5" stroke="#2c5f2e" stroke-width="0.7" opacity="0.35"/>
</svg>
